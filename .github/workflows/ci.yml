# ÜSTAT Plus V6.0 — CI/CD Pipeline (fail-closed)
# Anayasa Bolum F.3: tests/critical_flows + tests/governance zorunlu yesil.
# continue-on-error: true YASAK. Basarisiz test merge'i bloke eder.
name: ÜSTAT Plus V6.0 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Anayasa Dogrulama (manifest-kod senkron) ─────────────────
  constitution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bagimliliklar
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Anayasa dogrulama (check_constitution.py)
        run: python tools/check_constitution.py

  # ── Backend: Python lint + test ────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    needs: constitution
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} kur
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Bagimliliklari yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio pytest-timeout pyyaml

      - name: Syntax check (kritik dosyalar)
        run: |
          python -c "
          import py_compile, sys
          files = [
              'engine/baba.py',
              'engine/ogul.py',
              'engine/mt5_bridge.py',
              'engine/data_pipeline.py',
              'engine/database.py',
              'engine/main.py',
              'engine/manuel_motor.py',
              'engine/top5_selection.py',
          ]
          failed = []
          for f in files:
              try:
                  py_compile.compile(f, doraise=True)
                  print(f'  OK {f}')
              except py_compile.PyCompileError as e:
                  print(f'  FAIL {f}: {e}')
                  failed.append(f)
          if failed:
              print(f'{len(failed)} dosya BASARISIZ')
              sys.exit(1)
          print(f'{len(files)} dosya OK')
          "

      - name: Kritik akis testleri (tests/critical_flows)
        run: pytest tests/critical_flows -v --tb=short --timeout=60

      - name: Governance testleri (tests/governance)
        run: pytest tests/governance -v --tb=short --timeout=60

  # ── Frontend: Node.js + Vite build ────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    needs: constitution

    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Bagimliliklari yukle
        working-directory: desktop
        run: npm ci

      - name: Vite build
        working-directory: desktop
        run: npm run build
