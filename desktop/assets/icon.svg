<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#131920"/>
    </linearGradient>
    <linearGradient id="glow-green" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a7f37"/>
      <stop offset="100%" stop-color="#56d364"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a7f37" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#56d364"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="40" y1="80" x2="216" y2="80" stroke="#1c2128" stroke-width="0.5"/>
  <line x1="40" y1="120" x2="216" y2="120" stroke="#1c2128" stroke-width="0.5"/>
  <line x1="40" y1="160" x2="216" y2="160" stroke="#1c2128" stroke-width="0.5"/>
  <line x1="40" y1="200" x2="216" y2="200" stroke="#1c2128" stroke-width="0.5"/>

  <!-- Chart area fill (subtle gradient under the line) -->
  <polygon
    points="36,205 60,188 85,192 110,165 135,155 160,120 185,95 210,60 210,205"
    fill="url(#glow-green)"
    opacity="0.06"
  />

  <!-- Ascending chart line with glow -->
  <polyline
    points="36,205 60,188 85,192 110,165 135,155 160,120 185,95 210,60"
    fill="none"
    stroke="url(#line-fade)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Chart dots with glow -->
  <circle cx="110" cy="165" r="3.5" fill="#3fb950" filter="url(#glow)"/>
  <circle cx="160" cy="120" r="3.5" fill="#3fb950" filter="url(#glow)"/>
  <circle cx="210" cy="60" r="4" fill="#56d364" filter="url(#glow)"/>

  <!-- "U" letter with neon glow -->
  <text
    x="125"
    y="170"
    text-anchor="middle"
    font-family="Segoe UI, Inter, Arial, sans-serif"
    font-weight="800"
    font-size="130"
    fill="url(#glow-blue)"
    opacity="0.85"
    filter="url(#text-glow)"
  >U</text>

  <!-- Top-right accent arrow (uptrend indicator) -->
  <polyline
    points="196,48 210,36 210,52"
    fill="none"
    stroke="#56d364"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Border glow -->
  <rect x="1.5" y="1.5" width="253" height="253" rx="47" fill="none" stroke="#30363d" stroke-width="1" opacity="0.6"/>
</svg>
