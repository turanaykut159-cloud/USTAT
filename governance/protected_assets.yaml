# =====================================================
# 3. KORUNAN KURALLAR (Davranış Sözleşmeleri)
# =====================================================
# Kural değişimi: C3
protected_rules:
  - id: "R-01"
    title: "Çağrı Sırası"
    description: "heartbeat → data → BABA → risk_check → OĞUL → H-Engine → ÜSTAT. Değiştirilemez."
    location: "engine/main.py::_run_single_cycle"
    linked_inviolables: ["CI-07"]
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_main_loop_order"

  - id: "R-02"
    title: "Piyasa Rejimleri"
    description: "4 rejim (TREND/RANGE/VOLATILE/OLAY) ve risk çarpanları (1.0/0.7/0.25/0.0)"
    location: "engine/baba.py::detect_regime"
    linked_inviolables: ["CI-06"]
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_regime_types"

  - id: "R-03"
    title: "Top 5 Seçim Algoritması"
    description: "Ham skor → Winsorize + Min-Max → Ağırlıklı toplam → Ortalama filtre → Min 3 garanti → Vade/haber filtresi"
    location: "engine/ogul.py::select_top5"
    linked_inviolables: []
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_top5_pipeline"

  - id: "R-04"
    title: "Sinyal Stratejileri"
    description: "3 strateji (Trend Follow, Mean Reversion, Breakout) ve SL/TP formülleri"
    location: "engine/utils/signal_engine.py"
    linked_inviolables: []
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_signal_strategies"

  - id: "R-05"
    title: "Trade State Machine"
    description: "SIGNAL → PENDING → SENT → FILLED → CLOSED (TIMEOUT/PARTIAL/RETRY dalları)"
    location: "engine/models/trade.py::TradeState"
    linked_inviolables: []
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_trade_state_machine"

  - id: "R-06"
    title: "EOD Zorunlu Kapanış"
    description: "17:45 OĞUL + Hybrid pozisyonlar kapatılır; 17:50 hayalet pozisyon kontrolü; manuel + orphan hariç"
    location: "engine/ogul.py::_check_end_of_day"
    linked_inviolables: ["CI-04"]
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_eod_closure"

  - id: "R-07"
    title: "Kill-Switch Monotonluğu"
    description: "Seviye sadece yukarı gider (L1→L2→L3). Otomatik düşme yok; sadece kullanıcı düşürebilir"
    location: "engine/baba.py::_activate_kill_switch"
    linked_inviolables: ["CI-02"]
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_kill_switch_monotonic"

  - id: "R-08"
    title: "MT5 Başlatma Sorumluluğu"
    description: "MT5 terminal açma SADECE Electron (mt5Manager.js::launchMT5). Engine başlatamaz"
    location: "desktop/mt5Manager.js + engine/mt5_bridge.py::connect"
    linked_inviolables: ["CI-08"]
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_mt5_no_auto_launch"

  - id: "R-09"
    title: "SL/TP Zorunluluğu"
    description: "send_order 2 aşamalı: emir → SL/TP. SL/TP başarısız → pozisyon zorla kapatılır"
    location: "engine/mt5_bridge.py::send_order"
    linked_inviolables: ["CI-03"]
    required_tests:
      - "tests/critical_flows/test_static_contracts.py::test_sltp_mandatory"

  - id: "R-10"
    title: "Tek Çalışma Klasörü"
    description: "Tüm geliştirme C:\\Users\\pc\\Desktop\\USTAT içinde yapılır. Dışına çıkılması kullanıcı onayı gerektirir"
    location: "operasyon kuralı"
    linked_inviolables: []
    required_tests: []

  - id: "R-11"
    title: "Sihirli Sayı Yasağı"
    description: "Tüm sabitler config/default.json üzerinden yüklenir; kod içinde hardcoded değer yasak"
    location: "engine/config.py"
    linked_inviolables: []
    required_tests:
