# =====================================================
# 1. KORUNAN DOSYALAR (Kırmızı Bölge)
# =====================================================
# Değişiklik: C2 | Silme: C3
protected_files:
  - path: "engine/baba.py"
    reason: "Risk yönetimi, kill-switch, drawdown, rejim algılama"
    change_class: "C2"
    delete_class: "C3"

  - path: "engine/ogul.py"
    reason: "Emir state-machine, SL/TP, EOD kapanış, pozisyon yönetimi"
    change_class: "C2"
    delete_class: "C3"

  - path: "engine/mt5_bridge.py"
    reason: "MT5 emir gönderimi, SL/TP ekleme, pozisyon kapatma, circuit breaker"
    change_class: "C2"
    delete_class: "C3"

  - path: "engine/main.py"
    reason: "Ana döngü, modül çağrı sırası, heartbeat, hata yönetimi"
    change_class: "C2"
    delete_class: "C3"

  - path: "engine/ustat.py"
    reason: "Strateji yönetimi, portföy kararları"
    change_class: "C2"
    delete_class: "C3"

  - path: "engine/database.py"
    reason: "Trade kayıtları, risk state persistence, P&L takibi"
    change_class: "C2"
    delete_class: "C3"

  - path: "engine/data_pipeline.py"
    reason: "Piyasa verisi besleme, tüm modüllerin veri kaynağı"
    change_class: "C2"
    delete_class: "C3"

  - path: "config/default.json"
    reason: "Risk parametreleri, strateji sabitleri, tüm eşik değerleri"
    change_class: "C2"
    delete_class: "C3"

  - path: "start_ustat.py"
    reason: "Başlatma zinciri, watchdog, graceful shutdown"
    change_class: "C2"
    delete_class: "C3"

  - path: "api/server.py"
    reason: "API lifespan, Engine oluşturma sırası, route kayıt"
    change_class: "C2"
    delete_class: "C3"

