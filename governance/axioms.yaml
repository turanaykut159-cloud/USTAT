# USTAT ANAYASA v3.0 — YEDI DOKUNULMAZ CEKIRDEK (AXIOMS)
#
# Bu dosya anayasanin DEGISMEZ omurgasini tanimlar.
# Axiom'lar kanit gerektirmez, tartisilmaz, degismezler.
# Axiom ihlali = otomatik HALT + auditor cagrisi.
#
# Axiom'a dokunan her degisiklik C4 sinifindadir.
# Yeni axiom eklemek icin: kullanici onayi + 24 saat sogutma + triple sign-off.

manifest_version: "3.0"
last_updated: "2026-04-14"

axioms:
  - id: AX-1
    name: "Cagri Sirasi (ana dongu + istisnalar)"
    statement: |
      Ana dongu 4 motor SABIT sirasi: BABA -> OGUL -> H-Engine -> USTAT.
      Bu sira DEGISTIRILEMEZ (risk kontrolu sinyal uretiminden once).
      ISTISNA: ManuelMotor 5. motordur, ancak ON-DEMAND calisir (kullanici UI
      veya API endpoint tetigi ile) ve ana donguye girmez. ManuelMotor
      check_risk_limits kapisini BABA'dan gecmek zorundadir (AX-2) ve
      acilan pozisyonlar EOD istisnasina tabidir (AX-5).
    rationale: "Otomatik dongu sirasi atlanamaz; manuel motor ayri akisli ancak BABA kapisi altinda."
    enforced_in:
      - "engine/main.py::_run_single_cycle"
      - "engine/manuel_motor.py::open_manual_trade"
    violation_response: "HALT + auditor"

  - id: AX-2
    name: "can_trade Kapisi"
    statement: "OGUL, BABA'nin can_trade=False verdigi durumda yeni sinyal/emir uretemez."
    rationale: "Risk kapisi atlanamaz; her emir bu kapidan gecer."
    enforced_in: "engine/ogul.py::_execute_signal"
    violation_response: "HALT + auditor"

  - id: AX-3
    name: "Kill-Switch Monotonlugu (+ rejim istisnasi)"
    statement: |
      Kill-switch seviyesi sadece YUKARI eskale eder (NONE -> L1 -> L2 -> L3).
      Operator/tetik mekanizmalari ile devreye giren L1/L2/L3 seviyeleri
      OTOMATIK OLARAK DUSURULEMEZ. Dusurme sadece operator manuel ACK ile
      gerceklesir (UI Kill-Switch sayfasi -> _user_ack_kill_switch).
      Gunluk/haftalik/aylik sifirlama yapildiginda sayaclar (consecutive_losses,
      daily_trade_count, cooldown) sifirlanir ancak kill-switch seviyesi KORUNUR.
      ISTISNA: OLAY rejimi kaynakli L2 (reason="olay_regime") rejim yasam
      dongusune baglidir — regime_type OLAY iken otomatik aktif, OLAY kalkinca
      otomatik clear. Bu rejim-driven state makinesi, operator kill-switch'i
      degildir; yine de operator manuel olarak da ACK edebilir.
    rationale: "Guvenlik durumunun geri dondurulmesi yalnizca insan karari veya rejim lifecycle'i ile olur; rutin gunluk sifirlama otomatik dusurme SAYILMAZ."
    enforced_in:
      - "engine/baba.py::_activate_kill_switch"
      - "engine/baba.py::_clear_kill_switch"
      - "engine/baba.py::_reset_daily"
    violation_response: "HALT + auditor"

  - id: AX-4
    name: "SL/TP Zorunlulugu (motor-spesifik)"
    statement: |
      SL/TP zorunlulugu 4 motor icin uygulanir:
      (a) OGUL otomatik sinyal: SL/TP 2-asamali; SL fail -> pozisyon ZORLA kapatilir.
      (b) OgulSLTP fallback: STOP LIMIT (SL) + LIMIT (TP) yerlestirilir.
      (c) Manuel trade: SL/TP fail pozisyonu KAPATMAZ (operator bilinci) ancak
          baba.report_unprotected_position ile sistem kaydina gecirilir.
      (d) Hibrit yon donusumu: MT5 force_close; fail ise BABA raporlanir.
    rationale: "Finansal risk kontrolunun son halkasi; 4 motor asimetrik uygulama."
    enforced_in:
      - "engine/ogul.py::_execute_signal"
      - "engine/ogul_sltp.py::set_initial_sl"
      - "engine/ogul_sltp.py::set_initial_tp"
      - "engine/manuel_motor.py::open_manual_trade"
      - "engine/h_engine.py::_handle_direction_change"
    violation_response: "LOG + baba.report_unprotected_position + UI kritik alert"

  - id: AX-5
    name: "EOD Zorunlu Kapanis (otomatik + istisnalar)"
    statement: |
      17:45'te OGUL otomatik pozisyonlari ve Hibrit pozisyonlar (non-overnight)
      kapatilir. 17:50'de hayalet pozisyon kontrolu yapilir.
      ISTISNALAR (kullanici bilinci + sistem kaydi):
      (a) Manuel pozisyonlar: operator kararinda kalir, bildirim + DB kaydi.
      (b) Hibrit overnight: kullanici H-Engine tarafinda explicit "yarina birak"
          secerse kapanmaz; aksi halde OGUL ile ayni saatli kapanir.
      (c) Orphan pozisyonlar: BABA raporlanir, manuel mudahale beklenir.
    rationale: "Overnight risk varsayilan olarak yasak; istisna operator bilinci ve sistem kaydi ile."
    enforced_in:
      - "engine/ogul.py::_check_end_of_day"
      - "engine/ogul.py::_verify_eod_closure"
      - "engine/h_engine.py::run_cycle"
    violation_response: "LOG + DB notification + UI warning + baba.report"

  - id: AX-6
    name: "Hard Drawdown L3 Esigi"
    statement: "Toplam drawdown %15'e ulasirsa L3 kill-switch otomatik aktive edilir."
    rationale: "Felaket esigi. Esik degeri degistirilemez."
    enforced_in: "engine/baba.py::_check_hard_drawdown"
    violation_response: "HALT + auditor + acil bildirim"

  - id: AX-7
    name: "mt5.initialize Kaynak Birligi"
    statement: "mt5.initialize() cagrilari SADECE mt5_bridge.py::connect icinde yapilir."
    rationale: "MT5 terminal baslatma sorumlulugu Electron'da; engine baslatamaz."
    enforced_in: "engine/mt5_bridge.py::connect"
    violation_response: "HALT + auditor"

