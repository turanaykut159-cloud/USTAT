# v6.0: Test suite — aktif testler tests/ dizininde
# Çalıştırma: pytest (proje kökünden)
# Kritik akışlar: pytest tests/critical_flows -q
[pytest]
testpaths = tests
pythonpath = .
norecursedirs = archive USTAT_DEPO node_modules .git .agent dist release __pycache__ claude_worktrees
markers =
    slow: yavaş testler (UI smoke testleri)
    integration: entegrasyon testleri
    unit: birim testleri
asyncio_mode = auto
